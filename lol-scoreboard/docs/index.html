<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鬥快上韓服菁英2026 ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #050810;
    --bg2:       #0a0f1e;
    --panel:     #0d1428;
    --border:    #1a2a4a;
    --cyan:      #00f5ff;
    --gold:      #ffd700;
    --silver:    #c0c8d8;
    --bronze:    #cd7f32;
    --accent:    #ff3e6c;
    --text:      #ccd6f6;
    --dim:       #4a5a7a;
    --green:     #00ff88;
    --red:       #ff4466;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scanline overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,245,255,0.015) 2px,
      rgba(0,245,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── Grid background ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(20px, 5vw, 36px);
    font-weight: 900;
    color: var(--cyan);
    text-shadow:
      0 0 20px rgba(0,245,255,0.8),
      0 0 60px rgba(0,245,255,0.3);
    letter-spacing: 2px;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .header-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .header-divider {
    margin: 20px auto;
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  }

  /* ── Last updated ── */
  .last-updated {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 32px;
    letter-spacing: 1px;
  }

  .last-updated span {
    color: var(--cyan);
    opacity: 0.8;
  }

  /* ── Cards ── */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px 28px;
    display: grid;
    grid-template-columns: 60px 1fr auto;
    align-items: center;
    gap: 20px;
    transition: border-color 0.3s, box-shadow 0.3s;
    animation: fadeIn 0.6s ease both;
  }

  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    border-color: var(--cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.1), inset 0 0 20px rgba(0,245,255,0.03);
  }

  /* rank 1 highlight */
  .card[data-rank="1"] {
    border-color: rgba(255,215,0,0.4);
    background: linear-gradient(135deg, #0d1428 0%, #151c30 100%);
  }
  .card[data-rank="1"]:hover {
    border-color: var(--gold);
    box-shadow: 0 0 30px rgba(255,215,0,0.15);
  }

  /* corner accent */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 40px; height: 40px;
    border-top: 2px solid var(--cyan);
    border-left: 2px solid var(--cyan);
    border-radius: 4px 0 0 0;
    opacity: 0.4;
  }
  .card[data-rank="1"]::before { border-color: var(--gold); opacity: 0.7; }

  /* ── Rank badge ── */
  .rank-badge {
    text-align: center;
  }

  .rank-medal {
    font-size: 32px;
    line-height: 1;
    display: block;
    margin-bottom: 4px;
    filter: drop-shadow(0 0 8px currentColor);
  }

  .rank-num {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  /* ── Player info ── */
  .player-name {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(14px, 3vw, 18px);
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .player-tag {
    color: var(--dim);
    font-size: 12px;
    font-weight: 400;
  }

  .player-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .tier-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border: 1px solid currentColor;
    border-radius: 2px;
    letter-spacing: 1px;
  }

  .tier-Master, .tier-Grandmaster, .tier-Challenger {
    color: #a78bfa;
    border-color: rgba(167,139,250,0.4);
    text-shadow: 0 0 8px rgba(167,139,250,0.6);
  }

  .tier-Diamond   { color: #60a5fa; }
  .tier-Emerald   { color: #34d399; }
  .tier-Platinum  { color: #5eead4; }
  .tier-Gold      { color: var(--gold); }
  .tier-Silver    { color: var(--silver); }
  .tier-Bronze    { color: var(--bronze); }
  .tier-Iron      { color: #94a3b8; }
  .tier-Unranked, .tier-Error { color: var(--dim); }

  .record {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
  }

  .record .w { color: var(--green); }
  .record .l { color: var(--red); }

  /* ── LP display ── */
  .lp-block {
    text-align: right;
  }

  .lp-value {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0,245,255,0.6);
    line-height: 1;
    margin-bottom: 4px;
  }

  .card[data-rank="1"] .lp-value {
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.6);
  }

  .lp-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .winrate {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--green);
  }

  /* ── Profile link ── */
  .profile-link {
    display: inline-block;
    margin-top: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    text-decoration: none;
    letter-spacing: 1px;
    transition: color 0.2s;
  }
  .profile-link:hover { color: var(--cyan); }

  /* ── Error / loading states ── */
  .loading-msg, .error-msg {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    padding: 60px 20px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .error-msg { color: var(--accent); }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 48px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    opacity: 0.5;
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .card {
      grid-template-columns: 48px 1fr;
      grid-template-rows: auto auto;
    }
    .lp-block {
      grid-column: 2;
      text-align: left;
      margin-top: 8px;
    }
    .rank-medal { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="header-tag">⚡ SEASON 2026 ⚡</div>
    <h1>鬥快上韓服菁英2026</h1>
    <div class="header-sub">CYBERPUNK SCOREBOARD — REAL-TIME RANKING</div>
    <div class="header-divider"></div>
    <div style="font-size:13px;color:var(--dim);font-style:italic;">年年都搞，年年爛尾 XD</div>
  </header>

  <div class="last-updated" id="last-updated">載入資料中...</div>

  <div class="cards" id="cards">
    <div class="loading-msg">[ FETCHING DATA... ]</div>
  </div>

  <footer class="footer">
    <div>DATA SOURCE: LOL.PS &nbsp;|&nbsp; AUTO-UPDATE EVERY 8H</div>
  </footer>
</div>

<script>
const MEDALS = ["👑", "🥈", "🥉"];

function tierClass(tier) {
  return "tier-" + (tier || "Unranked");
}

function renderCards(players) {
  const container = document.getElementById("cards");
  if (!players || players.length === 0) {
    container.innerHTML = '<div class="error-msg">[ NO DATA ]</div>';
    return;
  }

  container.innerHTML = players.map((p, i) => {
    const medal = MEDALS[i] || `#${p.rank}`;
    const winrateColor = p.winrate >= 55 ? "var(--green)" : p.winrate >= 50 ? "var(--cyan)" : "var(--red)";
    const isError = p.tier === "Error";

    return `
    <div class="card" data-rank="${p.rank}">
      <div class="rank-badge">
        <span class="rank-medal">${medal}</span>
        <div class="rank-num">#${p.rank}</div>
      </div>

      <div class="player-info">
        <div class="player-name">
          ${p.name} <span class="player-tag">#${p.tag}</span>
        </div>
        <div class="player-meta">
          <span class="tier-badge ${tierClass(p.tier)}">${p.tier}</span>
          ${!isError ? `<span class="record">
            <span class="w">${p.wins}W</span>
            <span class="l"> ${p.losses}L</span>
          </span>` : ""}
        </div>
        <a class="profile-link" href="${p.url}" target="_blank" rel="noopener">↗ lol.ps profile</a>
      </div>

      <div class="lp-block">
        <div class="lp-value">${isError ? "ERR" : p.lp}</div>
        <div class="lp-label">LP</div>
        ${!isError ? `<div class="winrate" style="color:${winrateColor}">${p.winrate}%</div>` : ""}
      </div>
    </div>`;
  }).join("");
}

async function loadData() {
  const updatedEl = document.getElementById("last-updated");
  try {
    const res = await fetch("data.json?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    const dt = new Date(data.updated_at);
    const formatted = dt.toLocaleString("zh-TW", {
      timeZone: "Asia/Hong_Kong",
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit"
    });
    updatedEl.innerHTML = `最後更新：<span>${formatted} HKT</span>`;

    renderCards(data.players);
  } catch (e) {
    updatedEl.textContent = "資料載入失敗";
    document.getElementById("cards").innerHTML =
      `<div class="error-msg">[ ERROR: ${e.message} ]</div>`;
  }
}

loadData();
</script>
</body>
</html>
