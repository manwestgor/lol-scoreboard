name: Update Scoreboard

on:
  schedule:
    # Every 8 hours: 00:00, 08:00, 16:00 UTC
    - cron: "0 0,8,16 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/scrape.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch docs/history_archive.json
          git add docs/data.json docs/history.json docs/history_archive.json
          git diff --staged --quiet || git commit -m "chore: update scoreboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
