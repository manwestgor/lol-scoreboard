<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鬥快上韓服菁英2026 ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #050810;
    --panel:   #0d1428;
    --border:  #1a2a4a;
    --cyan:    #00f5ff;
    --gold:    #ffd700;
    --silver:  #c0c8d8;
    --bronze:  #cd7f32;
    --text:    #ccd6f6;
    --dim:     #4a5a7a;
    --green:   #00ff88;
    --red:     #ff4466;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,245,255,0.015) 2px, rgba(0,245,255,0.015) 4px); pointer-events: none; z-index: 999; }
  body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }
  .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px 60px; }
  .header { text-align: center; margin-bottom: 48px; }
  .header-tag { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--cyan); letter-spacing: 4px; text-transform: uppercase; opacity: 0.7; margin-bottom: 12px; }
  .header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(20px, 5vw, 36px); font-weight: 900; color: var(--cyan); text-shadow: 0 0 20px rgba(0,245,255,0.8), 0 0 60px rgba(0,245,255,0.3); letter-spacing: 2px; line-height: 1.2; margin-bottom: 12px; }
  .header-divider { margin: 16px auto; width: 200px; height: 1px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); }
  .last-updated { text-align: center; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--dim); margin-bottom: 32px; letter-spacing: 1px; }
  .last-updated span { color: var(--cyan); opacity: 0.8; }
  .cards { display: flex; flex-direction: column; gap: 16px; }
  .card { position: relative; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 24px 28px; display: grid; grid-template-columns: 60px 1fr auto; align-items: start; gap: 20px; transition: border-color 0.3s, box-shadow 0.3s; animation: fadeIn 0.6s ease both; }
  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .card:hover { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,245,255,0.1); }
  .card[data-rank="1"] { border-color: rgba(255,215,0,0.4); background: linear-gradient(135deg, #0d1428 0%, #151c30 100%); }
  .card[data-rank="1"]:hover { border-color: var(--gold); box-shadow: 0 0 30px rgba(255,215,0,0.15); }
  .card::before { content: ''; position: absolute; top: 0; left: 0; width: 40px; height: 40px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); border-radius: 4px 0 0 0; opacity: 0.4; }
  .card[data-rank="1"]::before { border-color: var(--gold); opacity: 0.7; }
  .rank-badge { text-align: center; padding-top: 4px; }
  .rank-medal { font-size: 32px; line-height: 1; display: block; margin-bottom: 4px; }
  .rank-num { font-family: 'Orbitron', monospace; font-size: 10px; color: var(--dim); letter-spacing: 2px; }
  .player-name { font-family: 'Orbitron', sans-serif; font-size: clamp(14px, 3vw, 18px); font-weight: 700; color: #fff; margin-bottom: 6px; letter-spacing: 1px; }
  .player-tag { color: var(--dim); font-size: 12px; font-weight: 400; }
  .player-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  .tier-badge { font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 2px 8px; border: 1px solid currentColor; border-radius: 2px; letter-spacing: 1px; }
  .tier-Master, .tier-Grandmaster, .tier-Challenger { color: #a78bfa; border-color: rgba(167,139,250,0.4); text-shadow: 0 0 8px rgba(167,139,250,0.6); }
  .tier-Diamond { color: #60a5fa; }
  .tier-Emerald { color: #34d399; }
  .tier-Platinum { color: #5eead4; }
  .tier-Gold { color: var(--gold); }
  .tier-Silver { color: var(--silver); }
  .tier-Bronze { color: var(--bronze); }
  .tier-Iron { color: #94a3b8; }
  .tier-Unranked, .tier-Error { color: var(--dim); }
  .record { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--dim); }
  .record .w { color: var(--green); }
  .record .l { color: var(--red); }
  .profile-link { display: inline-block; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); text-decoration: none; letter-spacing: 1px; transition: color 0.2s; }
  .profile-link:hover { color: var(--cyan); }
  .history-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); background: none; border: 1px solid var(--border); border-radius: 2px; padding: 3px 8px; cursor: pointer; transition: color 0.2s, border-color 0.2s; letter-spacing: 1px; }
  .history-btn:hover { color: var(--cyan); border-color: var(--cyan); }
  .history-btn .arrow { transition: transform 0.2s; display: inline-block; }
  .history-btn.open .arrow { transform: rotate(180deg); }
  .lp-block { text-align: right; }
  .lp-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .lp-row { display: flex; align-items: baseline; justify-content: flex-end; gap: 8px; }
  .lp-value { font-family: 'Orbitron', sans-serif; font-size: clamp(22px, 4vw, 32px); font-weight: 900; color: var(--cyan); text-shadow: 0 0 20px rgba(0,245,255,0.6); line-height: 1; }
  .card[data-rank="1"] .lp-value { color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.6); }
  .lp-diff { font-family: 'Share Tech Mono', monospace; font-size: 12px; font-weight: 700; }
  .lp-diff.pos { color: var(--green); }
  .lp-diff.neg { color: var(--red); }
  .lp-diff.zero { color: var(--dim); }
  .winrate { font-family: 'Share Tech Mono', monospace; font-size: 11px; margin-top: 4px; }
  .history-panel { display: none; grid-column: 1 / -1; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 14px; overflow-x: auto; }
  .history-panel.open { display: block; }
  .history-table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; font-size: 11px; }
  .history-table th { color: var(--dim); text-align: left; padding: 4px 10px; border-bottom: 1px solid var(--border); letter-spacing: 1px; white-space: nowrap; }
  .history-table td { padding: 5px 10px; color: var(--text); white-space: nowrap; border-bottom: 1px solid rgba(26,42,74,0.5); }
  .history-table tr:last-child td { border-bottom: none; }
  .td-lp { color: var(--cyan); font-weight: 700; }
  .td-rank { color: var(--gold); }
  .td-w { color: var(--green); }
  .td-l { color: var(--red); }
  .footer { text-align: center; margin-top: 48px; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); letter-spacing: 2px; opacity: 0.5; }
  @media (max-width: 520px) {
    .card { grid-template-columns: 48px 1fr; }
    .lp-block { grid-column: 2; text-align: left; }
    .lp-row { justify-content: flex-start; }
  }
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="header-tag">⚡ SEASON 2026 ⚡</div>
    <h1>鬥快上韓服菁英2026</h1>
    <div style="font-size:13px;color:var(--dim);font-style:italic;">年年都搞，年年爛尾 XD</div>
    <div class="header-divider"></div>
  </header>

  <div class="last-updated" id="last-updated">載入資料中...</div>
  <div class="cards" id="cards">
    <div style="text-align:center;font-family:'Share Tech Mono',monospace;color:var(--dim);padding:60px;">[ FETCHING DATA... ]</div>
  </div>
  <footer class="footer">DATA SOURCE: LOL.PS &nbsp;|&nbsp; AUTO-UPDATE EVERY 8H</footer>
</div>

<script>
const MEDALS = ["👑","🥈","🥉"];
let historyData = [];

function tierClass(t) { return "tier-" + (t || "Unranked"); }

function fmtDiff(diff) {
  if (diff === null || diff === undefined) return "";
  if (diff > 0) return `<span class="lp-diff pos">▲${diff}</span>`;
  if (diff < 0) return `<span class="lp-diff neg">▼${Math.abs(diff)}</span>`;
  return `<span class="lp-diff zero">±0</span>`;
}

function fmtDate(iso) {
  return new Date(iso).toLocaleString("zh-TW", {
    timeZone: "Asia/Hong_Kong",
    month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit"
  });
}

function buildHistoryTable(playerName) {
  const rows = [];
  for (let i = historyData.length - 1; i >= 0; i--) {
    const e = historyData[i];
    const p = e.players.find(x => x.name === playerName);
    if (p) rows.push({ date: e.updated_at, ...p });
  }
  if (!rows.length) return "<div style='color:var(--dim);font-family:Share Tech Mono,monospace;font-size:11px;padding:8px 0;'>尚無歷史紀錄</div>";
  return `<table class="history-table">
    <thead><tr><th>時間 (HKT)</th><th>排名</th><th>段位</th><th>LP</th><th>戰績</th><th>勝率</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${fmtDate(r.date)}</td>
      <td class="td-rank">#${r.rank}</td>
      <td>${r.tier}</td>
      <td class="td-lp">${r.lp} LP</td>
      <td><span class="td-w">${r.wins}W</span> <span class="td-l">${r.losses}L</span></td>
      <td>${r.winrate}%</td>
    </tr>`).join("")}</tbody>
  </table>`;
}

function toggleHistory(btn, tag, playerName) {
  const panel = document.getElementById("hist-" + tag);
  const isOpen = panel.classList.contains("open");
  if (!isOpen) { panel.innerHTML = buildHistoryTable(playerName); panel.classList.add("open"); btn.classList.add("open"); }
  else { panel.classList.remove("open"); btn.classList.remove("open"); }
}

function renderCards(players) {
  const c = document.getElementById("cards");
  if (!players || !players.length) { c.innerHTML = '<div style="text-align:center;color:var(--dim);padding:60px;font-family:Share Tech Mono,monospace;">[ NO DATA ]</div>'; return; }
  c.innerHTML = players.map((p, i) => {
    const isErr = p.tier === "Error";
    const wrColor = p.winrate >= 55 ? "var(--green)" : p.winrate >= 50 ? "var(--cyan)" : "var(--red)";
    return `<div class="card" data-rank="${p.rank}">
      <div class="rank-badge">
        <span class="rank-medal">${MEDALS[i]||"#"+p.rank}</span>
        <div class="rank-num">#${p.rank}</div>
      </div>
      <div>
        <div class="player-name">${p.name} <span class="player-tag">#${p.tag}</span></div>
        <div class="player-meta">
          <span class="tier-badge ${tierClass(p.tier)}">${p.tier}</span>
          ${!isErr?`<span class="record"><span class="w">${p.wins}W</span> <span class="l">${p.losses}L</span></span>`:""}
        </div>
        <a class="profile-link" href="${p.url}" target="_blank" rel="noopener">↗ lol.ps profile</a><br>
        <button class="history-btn" onclick="toggleHistory(this,'${p.tag}','${p.name}')">歷史紀錄 <span class="arrow">▾</span></button>
      </div>
      <div class="lp-block">
        <div class="lp-label">LP</div>
        <div class="lp-row">
          <div class="lp-value">${isErr?"ERR":p.lp}</div>
          ${!isErr?fmtDiff(p.lp_diff):""}
        </div>
        ${!isErr?`<div class="winrate" style="color:${wrColor}">${p.winrate}%</div>`:""}
      </div>
      <div class="history-panel" id="hist-${p.tag}"></div>
    </div>`;
  }).join("");
}

async function loadData() {
  const el = document.getElementById("last-updated");
  try {
    const t = Date.now();
    const [dr, hr] = await Promise.all([
      fetch("data.json?t="+t),
      fetch("history.json?t="+t).catch(()=>null),
    ]);
    if (!dr.ok) throw new Error("HTTP "+dr.status);
    const data = await dr.json();
    if (hr && hr.ok) historyData = await hr.json();
    el.innerHTML = `最後更新：<span>${new Date(data.updated_at).toLocaleString("zh-TW",{timeZone:"Asia/Hong_Kong",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})} HKT</span>`;
    renderCards(data.players);
  } catch(e) {
    el.textContent = "資料載入失敗";
    document.getElementById("cards").innerHTML = `<div style="text-align:center;color:#ff3e6c;font-family:Share Tech Mono,monospace;padding:60px;">[ ERROR: ${e.message} ]</div>`;
  }
}
loadData();
</script>
</body>
</html>
