<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鬥快上韓服菁英2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-top:    #0f0c29;
    --bg-mid:    #1a1040;
    --bg-bot:    #0d0d1a;
    --surface:   rgba(255,255,255,0.04);
    --surface2:  rgba(255,255,255,0.07);
    --border:    rgba(255,255,255,0.08);
    --gold:      #f5c842;
    --gold2:     #ffaa00;
    --silver:    #a8b8d0;
    --bronze:    #cd7f32;
    --text:      #ffffff;
    --text2:     #a0aec0;
    --text3:     #5a6478;
    --green:     #48d597;
    --red:       #f56565;
    --purple:    #b794f4;
    --accent:    #7c6aff;
    --twitch:    #9146ff;
    --bilibili:  #00a1d6;
    --youtube:   #ff0000;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-mid) 40%, var(--bg-bot) 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* star field */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 60%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 30%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 5%  55%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.25) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 20px 72px;
  }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 40px; }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 8vw, 56px);
    letter-spacing: 0.05em;
    color: #fff;
    line-height: 1;
    margin-bottom: 6px;
    text-shadow: 0 0 40px rgba(124,106,255,0.5);
  }

  .header-sub {
    font-size: 13px;
    color: var(--text3);
    font-style: italic;
    margin-bottom: 16px;
  }

  .last-updated {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ── Cards ── */
  .cards { display: flex; flex-direction: column; gap: 16px; }

  .card {
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface);
    backdrop-filter: blur(12px);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }
  .card:nth-child(1) { animation-delay: 0.08s; }
  .card:nth-child(2) { animation-delay: 0.16s; }
  .card:nth-child(3) { animation-delay: 0.24s; }

  @keyframes rise { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

  .card:hover { transform: translateY(-2px); }

  .card.rank-1 {
    border-color: rgba(245,200,66,0.35);
    background: linear-gradient(135deg, rgba(245,200,66,0.07) 0%, rgba(255,170,0,0.04) 100%), var(--surface);
    box-shadow: 0 0 0 1px rgba(245,200,66,0.15), 0 8px 32px rgba(245,200,66,0.08);
  }
  .card.rank-1:hover { box-shadow: 0 0 0 1px rgba(245,200,66,0.3), 0 12px 40px rgba(245,200,66,0.14); }

  .card.rank-2 {
    border-color: rgba(168,184,208,0.25);
    box-shadow: 0 0 0 1px rgba(168,184,208,0.1);
  }

  /* ── Crown for #1 ── */
  .crown-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: -16px;
    padding-top: 16px;
  }

  .crown { font-size: 40px; line-height: 1; filter: drop-shadow(0 4px 12px rgba(245,200,66,0.5)); }

  /* ── Card body ── */
  .card-body { padding: 20px 24px 0; }

  .rank-name-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
  }

  .rank-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--text3);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .card.rank-1 .rank-label { color: var(--gold); }
  .card.rank-2 .rank-label { color: var(--silver); }
  .card.rank-3 .rank-label { color: var(--bronze); }

  .player-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(22px, 5vw, 30px);
    letter-spacing: 0.04em;
    color: #fff;
    line-height: 1;
  }

  /* ── Stats grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-main {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .lp-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 0.02em;
    color: #fff;
    line-height: 1;
  }
  .card.rank-1 .lp-num { color: var(--gold); }

  .lp-unit {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
  }

  .lp-diff {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 600;
  }
  .lp-diff.pos { color: var(--green); }
  .lp-diff.neg { color: var(--red); }
  .lp-diff.zero { color: var(--text3); }

  .tier-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    margin-top: 3px;
  }
  .tier-Master,.tier-Grandmaster,.tier-Challenger { color: var(--purple); }
  .tier-Diamond  { color: #60a5fa; }
  .tier-Emerald  { color: #34d399; }
  .tier-Platinum { color: #5eead4; }
  .tier-Gold     { color: var(--gold); }
  .tier-Silver   { color: var(--silver); }
  .tier-Bronze   { color: var(--bronze); }
  .tier-Iron     { color: #94a3b8; }
  .tier-Unranked,.tier-Error { color: var(--text3); }

  .record-line {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    margin-bottom: 2px;
  }
  .record-line .w { color: var(--green); }
  .record-line .l { color: var(--red); }

  .wr-line {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  /* ── History toggle ── */
  .hist-toggle-row {
    display: flex;
    justify-content: center;
    padding: 8px 24px;
  }

  .hist-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
    letter-spacing: 0.04em;
  }
  .hist-btn:hover { color: var(--text2); }
  .hist-btn .arr { transition: transform 0.2s; }
  .hist-btn.open .arr { transform: rotate(180deg); }

  .hist-panel {
    display: none;
    padding: 0 24px 16px;
    overflow-x: auto;
  }
  .hist-panel.open { display: block; }

  .hist-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }
  .hist-table th {
    text-align: left;
    color: var(--text3);
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    font-weight: 400;
  }
  .hist-table td {
    padding: 5px 8px;
    color: var(--text2);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    white-space: nowrap;
  }
  .hist-table tr:last-child td { border-bottom: none; }
  .td-lp { color: #fff !important; }
  .td-rank { color: var(--gold) !important; }
  .td-w { color: var(--green) !important; }
  .td-l { color: var(--red) !important; }

  /* ── Bottom action bar ── */
  .card-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .card-actions.single { grid-template-columns: 1fr; }

  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-decoration: none;
    background: none;
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    letter-spacing: 0.02em;
  }

  .action-btn:hover { background: var(--surface2); color: #fff; }
  .action-btn + .action-btn { border-left: 1px solid var(--border); }

  .action-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
  .action-btn.twitch-btn:hover { color: #bf94ff; }
  .action-btn.bilibili-btn:hover { color: #4fc3f7; }
  .action-btn.youtube-btn:hover { color: #ff6b6b; }

  /* ── Footer ── */
  .footer {
    margin-top: 48px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  @media (max-width: 440px) {
    .stats-grid { grid-template-columns: 1fr; }
    .card-body { padding: 16px 16px 0; }
    .card-actions { grid-template-columns: 1fr; }
    .action-btn + .action-btn { border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <h1>鬥快上韓服菁英2026</h1>
    <div class="header-sub">年年都搞，年年爛尾 XD</div>
    <div class="last-updated" id="last-updated">
      <span class="live-dot"></span>
      <span>載入中...</span>
    </div>
  </header>

  <div class="cards" id="cards">
    <div style="text-align:center;padding:60px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);">Loading...</div>
  </div>

  <footer class="footer">Data · lol.ps &nbsp;·&nbsp; Auto-update every 8h</footer>
</div>

<script>
const MEDALS = ["👑","🥈","🥉"];
let historyData = [];

const STREAMS = {
  "KR2":  [{ platform:"twitch",   url:"https://twitch.tv/logicalaliens",                                         name:"logicalaliens" }],
  "2004": [{ platform:"twitch",   url:"https://www.twitch.tv/squirtle225",                                        name:"squirtle225" }],
  "2005": [{ platform:"bilibili", url:"https://space.bilibili.com/3546857848441096",                              name:"Leave me alone" }],
};

const PLATFORM_SVG = {
  twitch:   `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>`,
  bilibili: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.813 4.653h.854c1.51.054 2.769.578 3.773 1.574 1.004.995 1.524 2.249 1.56 3.76v7.36c-.036 1.51-.556 2.769-1.56 3.773s-2.262 1.524-3.773 1.56H5.333c-1.51-.036-2.769-.556-3.773-1.56S.036 18.858 0 17.347v-7.36c.036-1.511.556-2.765 1.56-3.76 1.004-.996 2.262-1.52 3.773-1.574h.774l-1.174-1.12a1.234 1.234 0 0 1-.373-.906c0-.356.124-.658.373-.907l.027-.027c.267-.249.573-.373.92-.373.347 0 .653.124.92.373L9.653 4.44c.071.071.134.142.187.213h4.267a.836.836 0 0 1 .16-.213l2.853-2.747c.267-.249.573-.373.92-.373.347 0 .662.151.929.4.267.249.391.551.391.907 0 .355-.124.657-.373.906zM5.333 7.24c-.746.018-1.373.276-1.88.773-.506.498-.769 1.13-.786 1.894v7.52c.017.764.28 1.395.786 1.893.507.498 1.134.756 1.88.773h13.334c.746-.017 1.373-.275 1.88-.773.506-.498.769-1.129.786-1.893v-7.52c-.017-.765-.28-1.396-.786-1.894-.507-.497-1.134-.755-1.88-.773zM8 11.107c.373 0 .684.124.933.373.25.249.383.569.4.96v1.173c-.017.391-.15.711-.4.96-.249.25-.56.374-.933.374s-.684-.125-.933-.374c-.25-.249-.383-.569-.4-.96V12.44c0-.373.129-.689.386-.947.258-.257.574-.386.947-.386zm8 0c.373 0 .684.124.933.373.25.249.383.569.4.96v1.173c-.017.391-.15.711-.4.96-.249.25-.56.374-.933.374s-.684-.125-.933-.374c-.25-.249-.383-.569-.4-.96V12.44c.017-.391.15-.711.4-.96.249-.249.56-.373.933-.373z"/></svg>`,
  youtube:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>`,
};

function tierClass(t) { return "tier-" + (t||"Unranked"); }

function fmtDiff(d) {
  if (d===null||d===undefined) return "";
  if (d>0) return `<span class="lp-diff pos">+${d}</span>`;
  if (d<0) return `<span class="lp-diff neg">${d}</span>`;
  return `<span class="lp-diff zero">±0</span>`;
}

function fmtDate(iso) {
  return new Date(iso).toLocaleString("zh-TW",{timeZone:"Asia/Hong_Kong",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function buildHistTable(name) {
  const rows=[];
  for(let i=historyData.length-1;i>=0;i--){
    const e=historyData[i], p=e.players.find(x=>x.name===name);
    if(p) rows.push({date:e.updated_at,...p});
  }
  if(!rows.length) return `<div style="padding:10px 0;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);">尚無歷史紀錄</div>`;
  return `<table class="hist-table">
    <thead><tr><th>時間 HKT</th><th>排名</th><th>段位</th><th>LP</th><th>戰績</th><th>勝率</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${fmtDate(r.date)}</td><td class="td-rank">#${r.rank}</td><td>${r.tier}</td>
      <td class="td-lp">${r.lp}</td>
      <td><span class="td-w">${r.wins}W</span> <span class="td-l">${r.losses}L</span></td>
      <td>${r.winrate}%</td>
    </tr>`).join("")}</tbody>
  </table>`;
}

function toggleHist(btn, tag, name) {
  const panel=document.getElementById("hp-"+tag);
  const open=panel.classList.toggle("open");
  btn.classList.toggle("open",open);
  if(open) panel.innerHTML=buildHistTable(name);
}

function buildActionBar(p) {
  const streams = STREAMS[p.tag]||[];
  const lolBtn = `<a class="action-btn" href="${p.url}" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    OP.GG / lol.ps
  </a>`;

  if(!streams.length) {
    return `<div class="card-actions single">${lolBtn}</div>`;
  }

  const streamBtns = streams.map(s=>`
    <a class="action-btn ${s.platform}-btn" href="${s.url}" target="_blank" rel="noopener">
      ${PLATFORM_SVG[s.platform]||""}
      ${s.name}
    </a>`).join("");

  return `<div class="card-actions">${streamBtns}${lolBtn}</div>`;
}

function renderCards(players) {
  const c=document.getElementById("cards");
  if(!players||!players.length){c.innerHTML=`<div style="padding:60px;text-align:center;font-family:'DM Mono',monospace;color:var(--text3);">No data</div>`;return;}
  c.innerHTML=players.map((p,i)=>{
    const isErr=p.tier==="Error";
    const wrColor=p.winrate>=55?"var(--green)":p.winrate>=50?"var(--text2)":"var(--red)";
    const crown=p.rank===1?`<div class="crown-wrap"><span class="crown">👑</span></div>`:"";
    return `<div class="card rank-${p.rank}">
      ${crown}
      <div class="card-body">
        <div class="rank-name-row">
          <span class="rank-label">#${p.rank} —</span>
          <span class="player-name">${p.name} <span style="font-size:14px;color:var(--text3);font-family:'DM Mono',monospace;">#${p.tag}</span></span>
        </div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">League Points</div>
            <div class="stat-main">
              <span class="lp-num">${isErr?"—":p.lp}</span>
              <span class="lp-unit">LP</span>
              ${!isErr?fmtDiff(p.lp_diff):""}
            </div>
            <div class="tier-text ${tierClass(p.tier)}">${p.tier}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Record</div>
            ${!isErr?`
              <div class="record-line"><span class="w">${p.wins}W</span> / <span class="l">${p.losses}L</span></div>
              <div class="wr-line" style="color:${wrColor}">WR ${p.winrate}%</div>
            `:`<div class="record-line" style="color:var(--text3)">—</div>`}
          </div>
        </div>
        <div class="hist-toggle-row">
          <button class="hist-btn" onclick="toggleHist(this,'${p.tag}','${p.name}')">歷史紀錄 <span class="arr">↓</span></button>
        </div>
        <div class="hist-panel" id="hp-${p.tag}"></div>
      </div>
      ${buildActionBar(p)}
    </div>`;
  }).join("");
}

async function init() {
  const el=document.getElementById("last-updated");
  try {
    const t=Date.now();
    const [dr,hr]=await Promise.all([
      fetch("data.json?t="+t),
      fetch("history.json?t="+t).catch(()=>null),
    ]);
    if(!dr.ok) throw new Error("HTTP "+dr.status);
    const data=await dr.json();
    if(hr&&hr.ok) historyData=await hr.json();
    el.innerHTML=`<span class="live-dot"></span><span>Updated ${new Date(data.updated_at).toLocaleString("zh-TW",{timeZone:"Asia/Hong_Kong",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})} HKT</span>`;
    renderCards(data.players);
  } catch(e) {
    el.innerHTML=`<span>Failed to load</span>`;
    document.getElementById("cards").innerHTML=`<div style="padding:60px;text-align:center;font-family:'DM Mono',monospace;color:var(--red);">Error: ${e.message}</div>`;
  }
}
init();
</script>
</body>
</html>
